openapi: 3.0.3
info:
  title: Rishfy API
  version: 0.4.0
  description: |
    Rishfy platform API. Sprint 4: Location service, WebSocket gateway, Admin dashboard.
servers:
  - url: http://localhost/api/v1
    description: Local gateway

tags:
  - name: auth
    description: Authentication, OTP, JWT issuance
  - name: bookings
    description: Booking saga, trip lifecycle, ratings
  - name: payments
    description: Mobile money payments, settlements, refunds
  - name: notifications
    description: In-app, push, and SMS notifications
  - name: location
    description: Driver location, trip trace, ETA estimation
  - name: admin
    description: Admin dashboard — KPIs, user management, LATRA

paths:
  /auth/register:
    post:
      tags: [auth]
      summary: Register a new user (issues OTP)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                email: { type: string, format: email }
                phoneNumber: { type: string }
                password: { type: string, minLength: 8 }
      responses:
        '201': { description: User created, OTP dispatched }
        '400': { description: Validation error }
        '429': { description: Rate limited }

  /auth/verify-otp:
    post:
      tags: [auth]
      summary: Verify OTP and issue tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, otpCode]
              properties:
                userId: { type: string, format: uuid }
                otpCode: { type: string }
      responses:
        '200': { description: Tokens issued }
        '400': { description: Invalid OTP }

  /auth/login:
    post:
      tags: [auth]
      summary: Password login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [identifier, password]
              properties:
                identifier: { type: string, description: email or phone }
                password: { type: string }
      responses:
        '200': { description: Tokens issued }
        '401': { description: Invalid credentials }
        '423': { description: Account locked }

  /auth/refresh-token:
    post:
      tags: [auth]
      summary: Rotate refresh token, issue new access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        '200': { description: New token pair }
        '401': { description: Refresh token invalid or revoked }

  /auth/logout:
    post:
      tags: [auth]
      summary: Revoke a refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        '200': { description: Token revoked }

  /auth/reset-password:
    post:
      tags: [auth]
      summary: Reset password via OTP
      responses:
        '200': { description: Password reset }

  # ===========================================================================
  # USER SERVICE
  # ===========================================================================
  /users/me:
    get:
      tags: [users]
      summary: Get my profile
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
    patch:
      tags: [users]
      summary: Update my profile
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name: { type: string }
                email: { type: string, format: email }
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }

  /users/me/profile-picture:
    post:
      tags: [users]
      summary: Get presigned URL for profile picture upload
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content_type]
              properties:
                content_type: { type: string, enum: [image/jpeg, image/png, image/webp] }
      responses:
        '200':
          description: Upload URL + public URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  uploadUrl: { type: string }
                  publicUrl: { type: string }

  /users/me/profile-picture/confirm:
    put:
      tags: [users]
      summary: Confirm profile picture upload
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [public_url]
              properties:
                public_url: { type: string, format: uri }
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }

  /users/me/become-driver:
    post:
      tags: [users]
      summary: Upgrade passenger account to driver
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BecomeDriverRequest' }
      responses:
        '201': { description: Driver profile created }
        '409': { description: Already a driver }

  /users/me/vehicles:
    get:
      tags: [users]
      summary: List my vehicles
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Vehicle list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Vehicle' }
    post:
      tags: [users]
      summary: Add a vehicle
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateVehicleRequest' }
      responses:
        '201':
          description: Vehicle created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Vehicle' }

  /users/me/vehicles/{vehicleId}:
    patch:
      tags: [users]
      summary: Update a vehicle
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: vehicleId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateVehicleRequest' }
      responses:
        '200': { description: Updated }
    delete:
      tags: [users]
      summary: Remove a vehicle
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: vehicleId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Deleted }

  /users/me/devices:
    post:
      tags: [users]
      summary: Register FCM device token
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fcm_token, platform, device_id]
              properties:
                fcm_token: { type: string }
                platform: { type: string, enum: [ios, android] }
                device_id: { type: string }
      responses:
        '201': { description: Device registered }

  /users/drivers/{userId}:
    get:
      tags: [users]
      summary: Get public driver profile
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Driver profile
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PublicDriverProfile' }

  # ===========================================================================
  # ROUTE SERVICE
  # ===========================================================================
  /routes:
    post:
      tags: [routes]
      summary: Post a new route (driver only)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateRouteRequest' }
      responses:
        '201':
          description: Route created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Route' }
        '403': { description: Driver not eligible }

  /routes/search:
    get:
      tags: [routes]
      summary: Search for routes near origin/destination
      parameters:
        - { in: query, name: origin_lat, required: true, schema: { type: number } }
        - { in: query, name: origin_lng, required: true, schema: { type: number } }
        - { in: query, name: destination_lat, required: true, schema: { type: number } }
        - { in: query, name: destination_lng, required: true, schema: { type: number } }
        - { in: query, name: departure_after, schema: { type: string, format: date-time } }
        - { in: query, name: seats_needed, schema: { type: integer, default: 1 } }
      responses:
        '200':
          description: Matching routes
          content:
            application/json:
              schema:
                type: object
                properties:
                  routes:
                    type: array
                    items: { $ref: '#/components/schemas/Route' }
                  total: { type: integer }

  /routes/me:
    get:
      tags: [routes]
      summary: Driver's own routes
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: query, name: limit, schema: { type: integer, default: 20 } }
        - { in: query, name: offset, schema: { type: integer, default: 0 } }
      responses:
        '200':
          description: Driver routes
          content:
            application/json:
              schema:
                type: object
                properties:
                  routes:
                    type: array
                    items: { $ref: '#/components/schemas/Route' }

  /routes/{id}:
    get:
      tags: [routes]
      summary: Get route by ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Route detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Route' }
    patch:
      tags: [routes]
      summary: Update a route (driver only)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateRouteRequest' }
      responses:
        '200': { description: Updated }
    delete:
      tags: [routes]
      summary: Cancel a route (driver only)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Cancelled }

  # ===========================================================================
  # BOOKING SERVICE
  # ===========================================================================
  /bookings:
    post:
      tags: [bookings]
      summary: Create a booking (saga — reserves seats + initiates payment)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateBookingRequest' }
      responses:
        '201': { description: Booking created, expiry job scheduled }
        '409': { description: Insufficient seats or route not active }

  /bookings/me:
    get:
      tags: [bookings]
      summary: List my bookings (as passenger or driver based on role)
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: query, name: limit, schema: { type: integer, default: 20 } }
        - { in: query, name: offset, schema: { type: integer, default: 0 } }
      responses:
        '200':
          description: Booking list
          content:
            application/json:
              schema:
                type: object
                properties:
                  bookings: { type: array, items: { $ref: '#/components/schemas/Booking' } }

  /bookings/{id}:
    get:
      tags: [bookings]
      summary: Get booking by ID
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Booking detail, content: { application/json: { schema: { $ref: '#/components/schemas/Booking' } } } }
        '404': { description: Not found }

  /bookings/{id}/cancel:
    post:
      tags: [bookings]
      summary: Cancel a booking
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        '200': { description: Booking cancelled }
        '403': { description: Not the passenger }
        '409': { description: Cannot cancel in current state }

  /bookings/{id}/start-trip:
    post:
      tags: [bookings]
      summary: Driver starts the trip
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Trip started }
        '409': { description: Invalid state }

  /bookings/{id}/complete-trip:
    post:
      tags: [bookings]
      summary: Driver marks trip complete
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Trip completed }

  /bookings/{id}/rate:
    post:
      tags: [bookings]
      summary: Submit rating after completed trip
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rating]
              properties:
                rating: { type: integer, minimum: 1, maximum: 5 }
                review: { type: string, maxLength: 500 }
      responses:
        '200': { description: Rating submitted }

  # ===========================================================================
  # PAYMENT SERVICE
  # ===========================================================================
  /payments/initiate:
    post:
      tags: [payments]
      summary: Initiate mobile money payment for a booking
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bookingId, amountTzs, method, payerPhone, idempotencyKey]
              properties:
                bookingId: { type: string, format: uuid }
                amountTzs: { type: integer }
                method: { type: string, enum: [mpesa_tz, tigopesa, airtel_money, halopesa] }
                payerPhone: { type: string, description: 'E.164 format' }
                idempotencyKey: { type: string, format: uuid }
      responses:
        '201':
          description: Payment initiated — user receives USSD push
          content:
            application/json:
              schema:
                type: object
                properties:
                  paymentId: { type: string, format: uuid }
                  status: { type: string }
                  instructions: { type: string }
                  expiresInSeconds: { type: integer }

  /payments/{id}/status:
    get:
      tags: [payments]
      summary: Get payment status
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Payment status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Payment' }

  /webhooks/azampay:
    post:
      tags: [payments]
      summary: Azampay payment callback webhook
      description: 'Provider posts here on payment completion. Signature verified via HMAC-SHA256.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200': { description: Callback processed }

  /drivers/{driverId}/earnings:
    get:
      tags: [payments]
      summary: Get driver earnings summary for a period
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: driverId, required: true, schema: { type: string, format: uuid } }
        - { in: query, name: from, schema: { type: string, format: date-time } }
        - { in: query, name: to, schema: { type: string, format: date-time } }
      responses:
        '200': { description: Earnings summary }

  /drivers/{driverId}/settlements:
    post:
      tags: [payments]
      summary: Create a settlement obligation (MVP — recorded, manual payout)
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: driverId, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [periodStart, periodEnd, payoutMethod, payoutPhone, bookingIds]
              properties:
                periodStart: { type: string, format: date-time }
                periodEnd: { type: string, format: date-time }
                payoutMethod: { type: string, enum: [mpesa_tz, tigopesa, airtel_money, halopesa] }
                payoutPhone: { type: string }
                bookingIds:
                  type: array
                  items:
                    type: object
                    properties:
                      bookingId: { type: string, format: uuid }
                      driverEarningsTzs: { type: integer }
      responses:
        '201': { description: Settlement created }

  # ===========================================================================
  # NOTIFICATION SERVICE
  # ===========================================================================
  /notifications:
    get:
      tags: [notifications]
      summary: List my notifications
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: query, name: limit, schema: { type: integer, default: 30 } }
        - { in: query, name: offset, schema: { type: integer, default: 0 } }
      responses:
        '200':
          description: Notification list with unread count
          content:
            application/json:
              schema:
                type: object
                properties:
                  notifications:
                    type: array
                    items: { $ref: '#/components/schemas/Notification' }
                  unread: { type: integer }

  /notifications/{id}/read:
    patch:
      tags: [notifications]
      summary: Mark notification as read
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        '204': { description: Marked read }

  /notifications/read-all:
    patch:
      tags: [notifications]
      summary: Mark all notifications as read
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: All marked read }

  # ---------------------------------------------------------------------------
  # Location service
  # ---------------------------------------------------------------------------

  /locations/driver/{driverId}:
    get:
      tags: [location]
      summary: Get latest known location for a driver
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: driverId
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: max_age_seconds
          schema: { type: integer, default: 60 }
      responses:
        '200':
          description: Last known location
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DriverLocation' }
        '404': { description: No location found }

  /locations/nearby:
    get:
      tags: [location]
      summary: Get nearby active drivers
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: lat
          required: true
          schema: { type: number }
        - in: query
          name: lng
          required: true
          schema: { type: number }
        - in: query
          name: radius_meters
          schema: { type: integer, default: 5000 }
      responses:
        '200':
          description: Nearby drivers
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/DriverLocation' }

  /trips:
    post:
      tags: [location]
      summary: Create a trip record (called when driver starts)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [booking_id, driver_id, origin_lat, origin_lng]
              properties:
                booking_id: { type: string, format: uuid }
                driver_id: { type: string, format: uuid }
                origin_lat: { type: number }
                origin_lng: { type: number }
                destination_lat: { type: number }
                destination_lng: { type: number }
      responses:
        '201':
          description: Trip created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Trip' }

  /trips/{bookingId}/start:
    post:
      tags: [location]
      summary: Mark trip as started
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: bookingId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Trip started }
        '404': { description: Trip not found }

  /trips/{bookingId}/complete:
    post:
      tags: [location]
      summary: Mark trip as completed
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: bookingId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Trip completed }
        '404': { description: Trip not found }

  # ---------------------------------------------------------------------------
  # WebSocket — documented for reference (not part of HTTP spec)
  # ---------------------------------------------------------------------------

  /ws/driver:
    get:
      tags: [location]
      summary: "[WebSocket] Driver location broadcast — upgrade to WS, send GPS JSON frames"
      description: |
        Upgrade to WebSocket at `ws://<host>/ws/driver?token=<jwt>`.
        Send frames: `{"lat": 0.0, "lng": 0.0, "bearing": 0, "speed": 0, "tripId": "uuid"}`.
        Server fans out to all `/ws/location` subscribers for the same driver.
      responses:
        '101': { description: Switching Protocols }

  /ws/location:
    get:
      tags: [location]
      summary: "[WebSocket] Passenger location subscribe — upgrade to WS, receive driver position updates"
      description: |
        Upgrade to WebSocket at `ws://<host>/ws/location?driverId=<uuid>&token=<jwt>`.
        Receive frames: `{"driverId": "uuid", "lat": 0.0, "lng": 0.0, "bearing": 0, "arrived": false}`.
      responses:
        '101': { description: Switching Protocols }

  # ---------------------------------------------------------------------------
  # Payment refund
  # ---------------------------------------------------------------------------

  /payments/{id}/refund:
    post:
      tags: [payments]
      summary: Refund a payment — cancellation policy applied
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string }
                departureTime: { type: string, format: date-time }
                cancelledAt: { type: string, format: date-time }
                forceFullRefund: { type: boolean, description: Admin only }
      responses:
        '200':
          description: Refund applied
          content:
            application/json:
              schema:
                type: object
                properties:
                  paymentId: { type: string, format: uuid }
                  refundedAmountTzs: { type: integer }
                  policy: { type: string, enum: [FULL_REFUND, PENALTY_50, NO_REFUND] }
                  status: { type: string }
        '422': { description: Not refundable or already refunded }

  # ---------------------------------------------------------------------------
  # Admin dashboard
  # ---------------------------------------------------------------------------

  /admin/overview/kpis:
    get:
      tags: [admin]
      summary: Platform KPIs — users, drivers, bookings today, gross revenue
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: KPIs
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_users: { type: integer }
                  active_drivers: { type: integer }
                  bookings_today: { type: integer }
                  gross_revenue_tzs: { type: integer }
                  delta_vs_last_week:
                    type: object
                    properties:
                      users: { type: number }
                      bookings: { type: number }
                      revenue: { type: number }

  /admin/overview/bookings-timeseries:
    get:
      tags: [admin]
      summary: Bookings and revenue timeseries
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: days
          schema: { type: integer, default: 30 }
      responses:
        '200':
          description: Daily series
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    date: { type: string, format: date }
                    bookings: { type: integer }
                    revenue: { type: integer }

  /admin/overview/top-routes:
    get:
      tags: [admin]
      summary: Top routes by booking volume (last 30 days)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 10 }
      responses:
        '200':
          description: Top routes
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    origin: { type: string }
                    destination: { type: string }
                    bookings: { type: integer }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        phone_number: { type: string }
        full_name: { type: string }
        email: { type: string, format: email, nullable: true }
        role: { type: string, enum: [passenger, driver, admin] }
        status: { type: string, enum: [active, suspended, pending_verification] }
        profile_picture_url: { type: string, nullable: true }
        average_rating: { type: number }
        total_ratings: { type: integer }
        created_at: { type: string, format: date-time }

    BecomeDriverRequest:
      type: object
      required: [license_number, license_expiry]
      properties:
        license_number: { type: string }
        license_expiry: { type: string, format: date }
        latra_permit_number: { type: string }

    Vehicle:
      type: object
      properties:
        id: { type: string, format: uuid }
        make: { type: string }
        model: { type: string }
        year: { type: integer }
        color: { type: string }
        plate_number: { type: string }
        capacity: { type: integer }
        status: { type: string, enum: [pending, approved, rejected] }

    CreateVehicleRequest:
      type: object
      required: [make, model, year, color, plate_number]
      properties:
        make: { type: string }
        model: { type: string }
        year: { type: integer }
        color: { type: string }
        plate_number: { type: string }
        capacity: { type: integer, default: 4 }

    PublicDriverProfile:
      type: object
      properties:
        user:
          type: object
          properties:
            id: { type: string }
            full_name: { type: string }
            average_rating: { type: number }
            role: { type: string }
        driverProfile:
          type: object
          properties:
            is_verified: { type: boolean }
            license_expiry: { type: string, format: date }

    Route:
      type: object
      properties:
        id: { type: string, format: uuid }
        driver_id: { type: string }
        vehicle_id: { type: string }
        origin_name: { type: string }
        destination_name: { type: string }
        available_seats: { type: integer }
        booked_seats: { type: integer }
        price_per_seat: { type: number }
        departure_time: { type: string, format: date-time }
        status: { type: string, enum: [draft, active, full, cancelled, completed] }
        polyline: { type: string, nullable: true }
        distance_meters: { type: integer, nullable: true }
        duration_seconds: { type: integer, nullable: true }
        recurrence: { type: string, enum: [none, daily, weekdays, weekly, custom] }
        driver_name: { type: string, nullable: true }
        driver_rating: { type: number, nullable: true }

    CreateRouteRequest:
      type: object
      required: [vehicle_id, origin_name, origin_lat, origin_lng, destination_name, destination_lat, destination_lng, available_seats, price_per_seat, departure_time]
      properties:
        vehicle_id: { type: string, format: uuid }
        origin_name: { type: string }
        origin_lat: { type: number }
        origin_lng: { type: number }
        destination_name: { type: string }
        destination_lat: { type: number }
        destination_lng: { type: number }
        available_seats: { type: integer }
        price_per_seat: { type: number }
        departure_time: { type: string, format: date-time }
        recurrence: { type: string, enum: [none, daily, weekdays, weekly, custom], default: none }
        recurrence_days: { type: array, items: { type: integer } }
        recurrence_end_date: { type: string, format: date }

    Booking:
      type: object
      properties:
        id: { type: string, format: uuid }
        passenger_id: { type: string, format: uuid }
        driver_id: { type: string, format: uuid }
        route_id: { type: string, format: uuid }
        seat_count: { type: integer }
        status:
          type: string
          enum: [pending, confirmed, cancelled, completed, expired]
        total_price_tzs: { type: integer }
        platform_fee_tzs: { type: integer }
        driver_earnings_tzs: { type: integer }
        confirmation_code: { type: string }
        expires_at: { type: string, format: date-time, nullable: true }
        pickup_lat: { type: number, nullable: true }
        pickup_lng: { type: number, nullable: true }
        dropoff_lat: { type: number, nullable: true }
        dropoff_lng: { type: number, nullable: true }
        passenger_rating: { type: integer, minimum: 1, maximum: 5, nullable: true }
        driver_rating: { type: integer, minimum: 1, maximum: 5, nullable: true }
        payment_id: { type: string, format: uuid, nullable: true }
        trip_started_at: { type: string, format: date-time, nullable: true }
        trip_completed_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    CreateBookingRequest:
      type: object
      required: [route_id, seat_count, idempotency_key]
      properties:
        route_id: { type: string, format: uuid }
        seat_count: { type: integer, minimum: 1, maximum: 6 }
        pickup_lat: { type: number }
        pickup_lng: { type: number }
        dropoff_lat: { type: number }
        dropoff_lng: { type: number }
        idempotency_key: { type: string }

    RateRequest:
      type: object
      required: [role, rating]
      properties:
        role: { type: string, enum: [passenger, driver] }
        rating: { type: integer, minimum: 1, maximum: 5 }
        comment: { type: string }

    Payment:
      type: object
      properties:
        id: { type: string, format: uuid }
        booking_id: { type: string, format: uuid }
        passenger_user_id: { type: string, format: uuid }
        amount_tzs: { type: integer }
        provider: { type: string, enum: [azampay, mock] }
        mno: { type: string, enum: [mpesa, tigopesa, airtelmoney, halopesa] }
        phone: { type: string }
        status:
          type: string
          enum: [pending, completed, failed, refunded]
        provider_reference: { type: string, nullable: true }
        failure_reason: { type: string, nullable: true }
        idempotency_key: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    InitiatePaymentRequest:
      type: object
      required: [booking_id, phone, mno, idempotency_key]
      properties:
        booking_id: { type: string, format: uuid }
        phone: { type: string, example: '255712345678' }
        mno: { type: string, enum: [mpesa, tigopesa, airtelmoney, halopesa] }
        idempotency_key: { type: string }

    Settlement:
      type: object
      properties:
        id: { type: string, format: uuid }
        driver_user_id: { type: string, format: uuid }
        period_start: { type: string, format: date-time }
        period_end: { type: string, format: date-time }
        total_amount_tzs: { type: integer }
        platform_fee_tzs: { type: integer }
        net_amount_tzs: { type: integer }
        booking_count: { type: integer }
        payout_method: { type: string }
        payout_phone: { type: string }
        status: { type: string, enum: [pending, processing, completed, failed] }
        provider_reference: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    EarningsSummary:
      type: object
      properties:
        total_earnings_tzs: { type: integer }
        total_platform_fees_tzs: { type: integer }
        total_settled_tzs: { type: integer }
        pending_balance_tzs: { type: integer }
        trip_count: { type: integer }

    Notification:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        template_key: { type: string }
        channel: { type: string, enum: [in_app, push, sms] }
        title: { type: string }
        body: { type: string }
        data: { type: object, additionalProperties: true, nullable: true }
        is_read: { type: boolean }
        delivered_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    DriverLocation:
      type: object
      properties:
        driver_id: { type: string, format: uuid }
        lat: { type: number }
        lng: { type: number }
        bearing: { type: number, nullable: true }
        speed_kmh: { type: number, nullable: true }
        accuracy_meters: { type: number, nullable: true }
        updated_at: { type: string, format: date-time }
        is_stale: { type: boolean }
        age_seconds: { type: integer }

    Trip:
      type: object
      properties:
        id: { type: string, format: uuid }
        booking_id: { type: string, format: uuid }
        driver_id: { type: string, format: uuid }
        passenger_id: { type: string, format: uuid }
        status: { type: string, enum: [pending, in_progress, completed, cancelled] }
        origin_lat: { type: number }
        origin_lng: { type: number }
        destination_lat: { type: number, nullable: true }
        destination_lng: { type: number, nullable: true }
        total_distance_meters: { type: integer, nullable: true }
        total_duration_seconds: { type: integer, nullable: true }
        path_encoded: { type: string, nullable: true }
        started_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
