name: rishfy
description: "Rishfy — Tanzania's first D5-licensed digital ride-sharing platform"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.4.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.1.0

  # Networking
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1
  retrofit: ^4.1.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3

  # Location & Maps
  geolocator: ^12.0.0
  google_maps_flutter: ^2.6.1
  google_polyline_algorithm: ^3.1.0

  # Firebase (Push notifications)
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  firebase_analytics: ^11.0.0
  firebase_crashlytics: ^4.0.0

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  pull_to_refresh: ^2.0.0
  flutter_slidable: ^3.1.0

  # Utilities
  intl: ^0.19.0
  timeago: ^3.6.1
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  uuid: ^4.4.0
  logger: ^2.3.0

  # Biometrics
  local_auth: ^2.2.0

  # Phone input
  intl_phone_field: ^3.2.0

  # Connectivity
  connectivity_plus: ^6.0.3

  # Permissions
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  integration_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.10
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  retrofit_generator: ^8.1.0
  go_router_builder: ^2.7.0

  # Testing
  mocktail: ^1.0.3
  bloc_test: ^9.1.7

  # Analysis
  riverpod_lint: ^2.3.10
  custom_lint: ^0.6.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

  generate: true  # Enables flutter_gen for l10n
