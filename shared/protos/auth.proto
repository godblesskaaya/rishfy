syntax = "proto3";

package rishfy.auth.v1;

import "common.proto";

option go_package = "github.com/rishfy/protos/auth";

// =============================================================================
// AUTH SERVICE — Internal gRPC API
// =============================================================================
// Owned by: Stella Kahungo
// Exposed on: auth-service:50051
// Purpose: Token validation for the API Gateway and other internal services.
// Public endpoints (login, register, etc.) are REST only — see openapi/auth.yaml
// =============================================================================

service AuthService {
  // Validate a JWT access token. Called by API Gateway on every request.
  // Must be fast (< 10ms p99). Cache public key in-memory.
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);

  // Issue a service-to-service token. Short-lived, scoped to caller service.
  // Used when one backend service calls another without user context.
  rpc IssueServiceToken(IssueServiceTokenRequest) returns (IssueServiceTokenResponse);

  // Revoke a refresh token (e.g., on logout or forced logout).
  rpc RevokeToken(RevokeTokenRequest) returns (RevokeTokenResponse);

  // Check if a phone number exists in the system (for registration flow).
  // Returns minimal info to avoid account enumeration attacks.
  rpc CheckPhoneExists(CheckPhoneExistsRequest) returns (CheckPhoneExistsResponse);

  // Get the JWKS (public keys) for token verification.
  // Called once at startup by each service.
  rpc GetPublicKeys(GetPublicKeysRequest) returns (GetPublicKeysResponse);
}

// -----------------------------------------------------------------------------

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  bool valid = 1;
  string user_id = 2;                       // UUID of authenticated user
  rishfy.common.UserRole role = 3;
  repeated string permissions = 4;          // e.g., ["booking:create", "route:read"]
  int64 expires_at = 5;                     // Unix epoch seconds
  string device_id = 6;                     // Device that owns this session
  string session_id = 7;
  rishfy.common.ErrorDetail error = 8;      // Populated if valid=false
}

message IssueServiceTokenRequest {
  string service_name = 1;                  // e.g., "booking-service"
  repeated string scopes = 2;
  int32 ttl_seconds = 3;                    // Max 3600 (1 hour)
}

message IssueServiceTokenResponse {
  string token = 1;
  int64 expires_at = 2;
}

message RevokeTokenRequest {
  string user_id = 1;
  string session_id = 2;                    // Optional — if empty, revoke all
  string reason = 3;
}

message RevokeTokenResponse {
  bool success = 1;
  int32 sessions_revoked = 2;
}

message CheckPhoneExistsRequest {
  string phone_number = 1;                  // E.164 format: +255...
}

message CheckPhoneExistsResponse {
  bool exists = 1;
  bool verified = 2;
}

message GetPublicKeysRequest {}

message GetPublicKeysResponse {
  message JWK {
    string kid = 1;                         // Key ID
    string kty = 2;                         // Key type (RSA)
    string use = 3;                         // "sig"
    string alg = 4;                         // "RS256"
    string n = 5;                           // Modulus (base64url)
    string e = 6;                           // Exponent (base64url)
  }
  repeated JWK keys = 1;
  int32 cache_ttl_seconds = 2;              // How long to cache
}
