# =============================================================================
# RISHFY — Prometheus Configuration
# =============================================================================
# Scrapes metrics from each microservice's /metrics endpoint.
# Each Node.js service exposes Prometheus metrics via prom-client.
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: development
    cluster: rishfy-dev

scrape_configs:
  # NGINX gateway metrics
  - job_name: nginx
    static_configs:
      - targets: ['nginx:80']
    metrics_path: /metrics

  # Application services
  - job_name: rishfy-services
    static_configs:
      - targets:
          - 'auth-service:8081'
          - 'user-service:8082'
          - 'route-service:8083'
          - 'booking-service:8084'
          - 'payment-service:8085'
          - 'location-service:8086'
          - 'notification-service:8087'
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        regex: '(.+)-service:.*'
        replacement: '$1'

  # Infrastructure
  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']
    # Requires optional postgres-exporter container

  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']
    # Requires optional redis-exporter container

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
