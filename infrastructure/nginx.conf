# =============================================================================
# RISHFY API GATEWAY — NGINX Configuration
# =============================================================================
# Purpose: Single public entry point for all mobile app traffic.
# Responsibilities:
#   1. Route /api/v1/<service>/... to the correct upstream
#   2. Rate limiting per IP and per user
#   3. Request ID injection for distributed tracing
#   4. CORS handling
#   5. Serve OpenAPI docs at /docs
#   6. Expose /health and /metrics for load balancer & Prometheus
# =============================================================================

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # Logging (structured for easy parsing into Loki/ELK)
    # -------------------------------------------------------------------------
    log_format json_combined escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request_id":"$http_x_request_id",'
        '"method":"$request_method",'
        '"path":"$request_uri",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"request_time":$request_time,'
        '"upstream":"$upstream_addr",'
        '"upstream_response_time":"$upstream_response_time",'
        '"user_agent":"$http_user_agent",'
        '"referer":"$http_referer"'
    '}';

    access_log /var/log/nginx/access.log json_combined;

    # -------------------------------------------------------------------------
    # Performance
    # -------------------------------------------------------------------------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    keepalive_requests 1000;

    client_max_body_size      10M;
    client_body_buffer_size   128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;

    # Request ID — generate if not supplied by client
    map $http_x_request_id $request_id_final {
        default   $http_x_request_id;
        ""        $request_id;
    }

    # -------------------------------------------------------------------------
    # Compression
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types application/json application/javascript text/css text/plain application/xml;

    # -------------------------------------------------------------------------
    # Rate Limiting
    # -------------------------------------------------------------------------
    # Global per-IP limit (DDoS protection)
    limit_req_zone $binary_remote_addr zone=global_ip:10m rate=30r/s;

    # Per-endpoint limits
    limit_req_zone $binary_remote_addr zone=auth_login:10m  rate=5r/m;   # Login: 5/min/IP
    limit_req_zone $binary_remote_addr zone=auth_otp:10m    rate=3r/m;   # OTP: 3/min/IP
    limit_req_zone $binary_remote_addr zone=auth_register:10m rate=2r/m; # Register: 2/min/IP

    # Per-user limit (requires lua-resty-core; simplified here)
    limit_req_zone $http_authorization zone=authenticated:20m rate=60r/m;

    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # -------------------------------------------------------------------------
    # Upstreams — one per service
    # -------------------------------------------------------------------------
    upstream auth_backend {
        least_conn;
        server auth-service:8081 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream user_backend {
        least_conn;
        server user-service:8082 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream route_backend {
        least_conn;
        server route-service:8083 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream booking_backend {
        least_conn;
        server booking-service:8084 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream payment_backend {
        least_conn;
        server payment-service:8085 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream location_backend {
        least_conn;
        server location-service:8086 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream location_ws_backend {
        server location-service:8186;
    }

    upstream notification_backend {
        least_conn;
        server notification-service:8087 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # =========================================================================
    # MAIN SERVER
    # =========================================================================
    server {
        listen 80 default_server;
        server_name _;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Apply global rate limit
        limit_req zone=global_ip burst=20 nodelay;
        limit_conn conn_per_ip 100;

        # Inject trace/request IDs on every request
        proxy_set_header X-Request-ID $request_id_final;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # HTTP/1.1 for keepalive
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # ---------------------------------------------------------------------
        # Gateway-level endpoints
        # ---------------------------------------------------------------------
        location = /health {
            access_log off;
            return 200 '{"status":"healthy","service":"gateway"}';
            add_header Content-Type application/json;
        }

        location = /metrics {
            stub_status on;
            access_log off;
            allow 172.16.0.0/12;  # Docker network
            allow 10.0.0.0/8;
            deny all;
        }

        # ---------------------------------------------------------------------
        # OpenAPI Documentation (Swagger UI)
        # ---------------------------------------------------------------------
        location /docs {
            alias /usr/share/nginx/html/docs;
            index index.html;
            try_files $uri $uri/ /docs/index.html;
        }

        # ---------------------------------------------------------------------
        # AUTH SERVICE
        # ---------------------------------------------------------------------
        location /api/v1/auth/login {
            limit_req zone=auth_login burst=2 nodelay;
            proxy_pass http://auth_backend;
        }

        location /api/v1/auth/register {
            limit_req zone=auth_register burst=1 nodelay;
            proxy_pass http://auth_backend;
        }

        location ~ ^/api/v1/auth/otp {
            limit_req zone=auth_otp burst=1 nodelay;
            proxy_pass http://auth_backend;
        }

        location /api/v1/auth/ {
            limit_req zone=authenticated burst=10 nodelay;
            proxy_pass http://auth_backend;
        }

        # ---------------------------------------------------------------------
        # USER SERVICE
        # ---------------------------------------------------------------------
        location /api/v1/users/ {
            limit_req zone=authenticated burst=10 nodelay;
            proxy_pass http://user_backend;
        }

        location /api/v1/vehicles/ {
            limit_req zone=authenticated burst=10 nodelay;
            proxy_pass http://user_backend;
        }

        # ---------------------------------------------------------------------
        # ROUTE SERVICE
        # ---------------------------------------------------------------------
        location /api/v1/routes/ {
            limit_req zone=authenticated burst=20 nodelay;
            proxy_pass http://route_backend;
        }

        # ---------------------------------------------------------------------
        # BOOKING SERVICE
        # ---------------------------------------------------------------------
        location /api/v1/bookings/ {
            limit_req zone=authenticated burst=5 nodelay;
            proxy_pass http://booking_backend;
        }

        # ---------------------------------------------------------------------
        # PAYMENT SERVICE
        # ---------------------------------------------------------------------
        location /api/v1/payments/ {
            limit_req zone=authenticated burst=5 nodelay;
            proxy_pass http://payment_backend;
        }

        # Webhook endpoints — no auth, but signature verification in service
        location /api/v1/webhooks/ {
            # Higher burst for provider retry logic
            limit_req zone=global_ip burst=50 nodelay;
            proxy_pass http://payment_backend;
            # Provider IPs only — configure per environment
            # allow 196.216.64.0/24;   # M-Pesa
            # deny all;
        }

        # ---------------------------------------------------------------------
        # LOCATION SERVICE
        # ---------------------------------------------------------------------
        location /api/v1/locations/ {
            limit_req zone=authenticated burst=30 nodelay;
            proxy_pass http://location_backend;
        }

        location /api/v1/trips/ {
            limit_req zone=authenticated burst=10 nodelay;
            proxy_pass http://location_backend;
        }

        # WebSocket for live location streaming
        location /ws/location {
            proxy_pass http://location_ws_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;  # Long-lived connections
            proxy_send_timeout 3600s;
        }

        # ---------------------------------------------------------------------
        # NOTIFICATION SERVICE
        # ---------------------------------------------------------------------
        location /api/v1/notifications/ {
            limit_req zone=authenticated burst=10 nodelay;
            proxy_pass http://notification_backend;
        }

        location /api/v1/devices/ {
            limit_req zone=authenticated burst=5 nodelay;
            proxy_pass http://notification_backend;
        }

        # ---------------------------------------------------------------------
        # Catch-all 404
        # ---------------------------------------------------------------------
        location / {
            return 404 '{"error":"NOT_FOUND","message":"Endpoint not found","path":"$uri"}';
            add_header Content-Type application/json;
        }

        # ---------------------------------------------------------------------
        # Error pages (JSON)
        # ---------------------------------------------------------------------
        error_page 429 /rate_limited.json;
        error_page 502 503 504 /upstream_error.json;

        location = /rate_limited.json {
            internal;
            return 429 '{"error":"RATE_LIMITED","message":"Too many requests. Please slow down."}';
            add_header Content-Type application/json;
        }

        location = /upstream_error.json {
            internal;
            return 503 '{"error":"SERVICE_UNAVAILABLE","message":"Upstream service temporarily unavailable","request_id":"$request_id_final"}';
            add_header Content-Type application/json;
        }
    }
}
